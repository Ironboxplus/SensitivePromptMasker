<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" role="img" aria-labelledby="title desc">
  <title id="title">SensitivePromptMasker privacy flow</title>
  <desc id="desc">Sensitive text is replaced before the provider request and restored before the client receives the response.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.5" stop-color="#102b46"/>
      <stop offset="1" stop-color="#09251f"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 .5 .5" to="360 .5 .5" dur="16s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#56d8ff"/>
      <stop offset="0.5" stop-color="#8bf7c6"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8bf7c6"/>
    </marker>
  </defs>

  <rect width="1120" height="300" rx="22" fill="url(#background)"/>
  <rect x="1" y="1" width="1118" height="298" rx="21" fill="none" stroke="#7ee8c2" stroke-opacity=".35"/>

  <text x="560" y="48" text-anchor="middle" fill="#f2fbff" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">
    发给模型前先打码，返回客户端前再还原
  </text>
  <text x="560" y="76" text-anchor="middle" fill="#aac6d7" font-family="Segoe UI,Arial,sans-serif" font-size="14">
    Claude · Codex Responses · OpenAI Chat · 流式与非流式
  </text>

  <g font-family="Segoe UI,Arial,sans-serif">
    <rect x="46" y="112" width="240" height="126" rx="16" fill="#12263d" stroke="#56d8ff" stroke-opacity=".75"/>
    <text x="166" y="143" text-anchor="middle" fill="#56d8ff" font-size="16" font-weight="700">客户端原始请求</text>
    <text x="68" y="176" fill="#dcecf4" font-size="14">email: alice@example.com</text>
    <text x="68" y="201" fill="#dcecf4" font-size="14">path: D:\work\project</text>
    <text x="68" y="224" fill="#ff9d9d" font-size="13">敏感内容尚未保护</text>

    <rect x="438" y="112" width="244" height="126" rx="16" fill="#12352f" stroke="#8bf7c6" stroke-opacity=".85"/>
    <text x="560" y="143" text-anchor="middle" fill="#8bf7c6" font-size="16" font-weight="700">CPA Sensitive</text>
    <text x="461" y="176" fill="#e1fff5" font-size="14">email: CPA_S_…_</text>
    <text x="461" y="201" fill="#e1fff5" font-size="14">path: CPA_S_…_</text>
    <text x="461" y="224" fill="#8bf7c6" font-size="13">只把映射留在当前请求会话</text>

    <rect x="834" y="112" width="240" height="126" rx="16" fill="#392d18" stroke="#ffd166" stroke-opacity=".8"/>
    <text x="954" y="143" text-anchor="middle" fill="#ffd166" font-size="16" font-weight="700">客户端收到响应</text>
    <text x="856" y="176" fill="#fff4d2" font-size="14">email: alice@example.com</text>
    <text x="856" y="201" fill="#fff4d2" font-size="14">path: D:\work\project</text>
    <text x="856" y="224" fill="#ffd166" font-size="13">内容恢复，marker 不外泄</text>
  </g>

  <path d="M300 175 H420" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <circle r="6" fill="#56d8ff" filter="url(#glow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M300 175 H410"/>
  </circle>
  <text x="360" y="158" text-anchor="middle" fill="#9edcf0" font-family="Segoe UI,Arial,sans-serif" font-size="12">脱敏</text>

  <path d="M700 175 H816" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" filter="url(#glow)"/>
  <circle r="6" fill="#ffd166" filter="url(#glow)">
    <animateMotion dur="1.8s" begin=".9s" repeatCount="indefinite" path="M700 175 H806"/>
  </circle>
  <text x="758" y="158" text-anchor="middle" fill="#d6f6e9" font-family="Segoe UI,Arial,sans-serif" font-size="12">恢复</text>

  <circle cx="560" cy="264" r="5" fill="#8bf7c6">
    <animate attributeName="opacity" values=".25;1;.25" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;7;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="575" y="269" fill="#a9c9c0" font-family="Segoe UI,Arial,sans-serif" font-size="12">
    稳定 marker · 保留 JSON 原始结构 · 支持跨 chunk 恢复
  </text>
</svg>
